name: SDK Sync — Notify Python SDK

on:
  push:
    branches: [main]
    paths: [CONTRACT.md]

concurrency:
  group: sdk-sync
  cancel-in-progress: false

jobs:
  create-tracking-issue:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Extract version and diff
        id: contract
        run: |
          VERSION=$(grep '^version:' CONTRACT.md | head -1 | awk '{print $2}')
          if [ -z "$VERSION" ]; then
            echo "ERROR: No 'version:' line found in CONTRACT.md"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Multiline output via random delimiter (safe for arbitrary diff content)
          DELIMITER="EOF_$(openssl rand -hex 8)"
          echo "diff<<$DELIMITER" >> "$GITHUB_OUTPUT"
          # Guard against first-commit case where HEAD~1 does not exist
          git diff HEAD~1 HEAD -- CONTRACT.md 2>/dev/null \
            || git show HEAD:CONTRACT.md
          echo "$DELIMITER" >> "$GITHUB_OUTPUT"

      - name: Create tracking issue in Python SDK repo
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PYTHON_SDK_REPO_TOKEN }}
          # Pass outputs as inputs to avoid script injection via template interpolation
          version: ${{ steps.contract.outputs.version }}
          diff: ${{ steps.contract.outputs.diff }}
          commit-sha: ${{ github.sha }}
          repository: ${{ github.repository }}
          script: |
            // Read via core.getInput — never interpolated as JS code
            const version = core.getInput('version');
            const diff = core.getInput('diff');
            const commitSha = core.getInput('commit-sha');
            const repo = core.getInput('repository');

            const commitUrl = `https://github.com/${repo}/commit/${commitSha}`;
            const contractUrl = `https://github.com/${repo}/blob/${commitSha}/CONTRACT.md`;

            // 1.0.0 is the initial release — treat as non-breaking.
            // Any other X.0.0 (2.0.0, 3.0.0, …) is a major bump.
            const parts = version.split('.');
            const isMajor = parts[1] === '0' && parts[2] === '0' && version !== '1.0.0';

            const labels = isMajor
              ? ['sdk-sync', 'breaking-change']
              : ['sdk-sync'];

            const body = [
              `## SDK Contract updated to v${version}`,
              ``,
              `The TypeScript SDK was updated in commit: ${commitUrl}`,
              ``,
              `### What changed in the API surface`,
              ``,
              `\`\`\`diff`,
              diff,
              `\`\`\``,
              ``,
              `### What needs to be implemented in the Python SDK`,
              ``,
              `- [ ] Review the diff above and implement all API surface changes in Python`,
              `- [ ] Update \`pyproject.toml\` version to \`${version}\``,
              `- [ ] Run the full test suite: \`pytest\``,
              `- [ ] Close this issue when the Python PR is merged`,
              ``,
              `### Semver impact`,
              ``,
              isMajor
                ? `**MAJOR** — breaking change, coordinate release timing with TS SDK`
                : `**MINOR/PATCH** — additive or fix only`,
              ``,
              `### Reference`,
              ``,
              `- TS SDK commit: ${commitUrl}`,
              `- CONTRACT.md at this version: ${contractUrl}`,
            ].join('\n');

            try {
              await github.rest.issues.create({
                owner: 'llmforagents',
                repo: 'sdk-python',
                title: `[sync] CONTRACT updated to v${version}`,
                body,
                labels,
              });
              core.info(`Tracking issue created in llmforagents/sdk-python for v${version}`);
            } catch (err) {
              // Degrade gracefully: warn (not fail) so a missing label or missing repo
              // does not create a red check on the source SDK commit.
              core.warning(`Could not create tracking issue in llmforagents/sdk-python: ${err.message}`);
              core.warning('Ensure PYTHON_SDK_REPO_TOKEN has issues:write on sdk-python and the sdk-sync label exists.');
            }
